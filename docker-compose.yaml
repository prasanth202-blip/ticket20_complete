version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    ports:
      - "5000:5000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:5173
    depends_on:
      - backend
